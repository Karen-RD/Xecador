<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo -->
  <rect width="100" height="100" rx="16" fill="#1B2A1C"/>
  
  <!-- X de Xcaret multicolor -->
  <!-- Brazo superior izquierdo → inferior derecho (azul y verde) -->
  <polygon points="15,15 35,15 50,35 65,15 85,15 57,50 85,85 65,85 50,65 35,85 15,85 43,50" fill="none"/>
  
  <!-- Triángulo azul oscuro (arriba izquierda) -->
  <polygon points="12,12 38,12 50,32" fill="#1A5EA8"/>
  <!-- Triángulo cyan (arriba izquierda interior) -->
  <polygon points="38,12 50,32 50,12" fill="#29ABE2"/>
  <!-- Triángulo verde (abajo izquierda) -->
  <polygon points="12,88 38,88 50,68" fill="#39B54A"/>
  <!-- Triángulo amarillo (abajo izquierda interior) -->
  <polygon points="38,88 50,68 50,88" fill="#F7941D"/>
  <!-- Triángulo rojo/naranja (arriba derecha) -->
  <polygon points="88,12 62,12 50,32" fill="#ED1C24"/>
  <!-- Triángulo rosa (arriba derecha interior) -->
  <polygon points="62,12 50,32 50,12" fill="#C1272D"/>
  <!-- Triángulo verde oscuro (abajo derecha) -->
  <polygon points="88,88 62,88 50,68" fill="#8DC63F"/>
  <!-- Triángulo naranja (abajo derecha interior) -->
  <polygon points="62,88 50,68 50,88" fill="#F15A24"/>

  <!-- Centro de la X -->
  <polygon points="35,12 50,32 65,12 88,12 88,15 65,15 57,28 88,15 
                   88,88 65,88 50,68 35,88 12,88 12,85 35,85 43,72 12,85
                   12,12"
    fill="none"/>
  
  <!-- Trazo principal de la X -->
  <path d="M20,15 L42,15 L50,28 L58,15 L80,15 L60,50 L80,85 L58,85 L50,72 L42,85 L20,85 L40,50 Z" 
        fill="none"/>

  <!-- X simplificada multicolor -->
  <g>
    <!-- Parte superior izquierda -->
    <polygon points="14,14 40,14 50,30 50,14" fill="#29ABE2"/>
    <polygon points="14,14 40,14 50,30 14,50" fill="#1A5EA8"/>
    <!-- Parte superior derecha -->
    <polygon points="86,14 60,14 50,30 50,14" fill="#ED1C24"/>
    <polygon points="86,14 60,14 50,30 86,50" fill="#BE1E2D"/>
    <!-- Parte inferior izquierda -->
    <polygon points="14,86 40,86 50,70 14,50" fill="#39B54A"/>
    <polygon points="14,86 40,86 50,70 50,86" fill="#8DC63F"/>
    <!-- Parte inferior derecha -->
    <polygon points="86,86 60,86 50,70 86,50" fill="#F7941D"/>
    <polygon points="86,86 60,86 50,70 50,86" fill="#F15A24"/>
  </g>
</svg>